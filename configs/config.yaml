app:
  name: ops-container
  env: dev
  version: 1.0.0

server:
  host: 0.0.0.0
  port: 9101
  read_timeout: 10s
  write_timeout: 10s
  shutdown_timeout: 10s

auth:
  # my_ip：本机对外暴露给 ops-api 的 IP；留空则自动检测第一个非 loopback IPv4。
  # 多网卡时建议明确填写，避免检测结果不确定。
  my_ip: "127.0.0.1"
  # tokens：静态 token 列表，无 ops_api.url 时可用于临时鉴权。
  tokens: []

# ops-api 地址，容器启动时从此拉取本机 secret（内存持有，不落盘）
# 填写后 secret 由 ops-api 按 IP 独立分配，无需手动配置
ops_api:
  url: "http://127.0.0.1:8080"
  timeout: 10s

log:
  level: debug
  format: console
  filename: logs/app.log
  max_size_mb: 100
  max_backups: 5
  max_age_days: 30
  compress: false

telemetry:
  service_name: ops-container
  exporter: otlp
  otlp_endpoint: localhost:4317
  insecure: true
  sampling_percent: 100

prometheus:
  enable: true
  path: /metrics

swagger:
  enable: true
  path: /swagger/*any

development:
  enable_pprof: true
