app:
  name: ops-container
  env: dev
  version: 1.0.0

server:
  host: 0.0.0.0
  port: 8080
  read_timeout: 10s
  write_timeout: 10s
  shutdown_timeout: 10s

database:
  enable: false
  driver: mysql
  dsn: root:root@tcp(127.0.0.1:3306)/ops_container?charset=utf8mb4&parseTime=True&loc=Local
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

auth:
  tokens:
    - "ccibaM1Z9&I8lQ"
    - "123"
    - "456"

log:
  level: info
  format: console
  filename: logs/app.log
  max_size_mb: 100
  max_backups: 5
  max_age_days: 30
  compress: false

telemetry:
  service_name: ops-container
  exporter: otlp
  otlp_endpoint: localhost:4317
  insecure: true
  sampling_percent: 100

prometheus:
  enable: true
  path: /metrics

swagger:
  enable: true
  path: /swagger/*any

development:
  enable_pprof: true
