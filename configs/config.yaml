app:
  name: ops-container
  env: dev
  version: 1.0.0

server:
  host: 0.0.0.0
  port: 9101
  read_timeout: 10s
  write_timeout: 10s
  shutdown_timeout: 10s

auth:
  # HMAC 模式（推荐）：与 ops-api cfg.docker.secret 填同一个字符串即可，无需录入 token。
  # ops-api 用 HMAC-SHA256(secret, 本机IP) 计算 Authorization，本侧自动验证。
  secret: ""
  # my_ip：本机对外暴露给 ops-api 的 IP；留空则自动检测第一个非 loopback IPv4。
  # 多网卡时建议明确填写，避免检测结果不确定。
  my_ip: "127.0.0.1"
  # tokens：兜底静态列表，secret 验证通过时不走此列表。可留空。
  tokens: []

log:
  level: debug
  format: console
  filename: logs/app.log
  max_size_mb: 100
  max_backups: 5
  max_age_days: 30
  compress: false

telemetry:
  service_name: ops-container
  exporter: otlp
  otlp_endpoint: localhost:4317
  insecure: true
  sampling_percent: 100

prometheus:
  enable: true
  path: /metrics

swagger:
  enable: true
  path: /swagger/*any

development:
  enable_pprof: true
